<!DOCTYPE html>
<html lang="en">
  <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width-device-width" , initial-scale=1.0">
     <title>CSS Styling Examples</title>
     <!--Internal CSS-->
     <style>
     h2{
     color :green;
    }
     </style>
     <!--External CSS-->
     <link rel="stylesheet" href="Style.css">
     </head>
     <body>
        <hr>
         <!--Inline CSS-->
         <h1 style="color: red ;"> Inline Class Example</h1>
         <!--Internal CSS-->
         <h2>Inline Class Example</h2>
         <!--External CSS-->
         <h3>External CSS Example</h3>
         <hr>

         <!--Element Selector Example-->
         <h4>Element Selector Example</h4>
         <h4>Element Selector Example</h4>
         <hr>

          <!--Class and ID Selector Example-->
          <h2 class="myclass">Class Selector Example</h2>
          <h2 id="myid=">ID Selector Example</h2>
          <h2 class="myclass">Class Selector Example</h2>
          <hr>

        <!--Group Selector Example--> 
        <h5>Group Selector Example</h5>
        <p>Group Selector Example</p>
        <hr>

        </body>
    </html>
